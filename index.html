<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preload the hero background so it starts downloading at HTML parse time,
         in parallel with the JS bundle, instead of after React mounts.
         Path is tied to vite `base` (/Sarvin-Asha/) + public/hero.jpg. -->
    <link rel="preload" as="image" href="/Sarvin-Asha/hero.jpg" fetchpriority="high" />
    <title>Sarvin Nair & Asha — Forever Begins</title>
    <meta name="description" content="Join us as we celebrate the wedding of Sarvin Nair & Asha" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <!-- Dark background behind the entry overlay so there's no white flash on
       load; App reverts it to the site's warm-white once the visitor enters. -->
  <body style="background-color: #0a0406">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
